{% extends "base.html" %}

{% block title %}Login | AquiSo{% endblock %}

{% block content %}
<div class="login-wrap">
    <div class="login-card">
        <div class="pill">Multi-vendor platform</div>
        <h1>AquiSo</h1>
        <p class="hint">Sign in to continue to your company workspace. Each business only sees the modules that were activated for their account.</p>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="button">Sign In</button>
        </form>
    </div>
</div>
{% endblock %}
