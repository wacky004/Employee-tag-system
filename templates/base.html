<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Employee Tag System{% endblock %}</title>
    <style>
        :root {
            --bg: #f4f7fb;
            --surface: #ffffff;
            --surface-alt: #e9eef5;
            --text: #14213d;
            --muted: #5c677d;
            --accent: #2a6f97;
            --accent-dark: #014f86;
            --success: #2d6a4f;
            --warning: #c1121f;
            --border: #d7deea;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background:
                radial-gradient(circle at top left, rgba(42, 111, 151, 0.18), transparent 30%),
                linear-gradient(180deg, #f8fbff 0%, var(--bg) 100%);
            color: var(--text);
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .page {
            min-height: 100vh;
            padding: 24px;
        }

        .shell {
            max-width: 1180px;
            margin: 0 auto;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 24px;
            padding: 18px 22px;
            background: rgba(255, 255, 255, 0.84);
            border: 1px solid rgba(215, 222, 234, 0.9);
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        .brand h1 {
            margin: 0;
            font-size: 1.35rem;
        }

        .brand p,
        .user-chip,
        .hint,
        .card p,
        .hero p {
            color: var(--muted);
        }

        .brand p,
        .hero p,
        .card p {
            margin: 6px 0 0;
        }

        .user-chip {
            padding: 10px 14px;
            border-radius: 999px;
            background: var(--surface-alt);
            font-size: 0.95rem;
        }

        .hero {
            margin-bottom: 24px;
            padding: 32px;
            border-radius: 28px;
            background: linear-gradient(135deg, rgba(1, 79, 134, 0.96), rgba(42, 111, 151, 0.88));
            color: #fff;
            box-shadow: 0 24px 50px rgba(20, 33, 61, 0.14);
        }

        .hero h2 {
            margin: 0;
            font-size: clamp(2rem, 4vw, 3rem);
        }

        .hero p {
            max-width: 760px;
            color: rgba(255, 255, 255, 0.84);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 18px;
        }

        .card {
            padding: 22px;
            border-radius: 22px;
            background: var(--surface);
            border: 1px solid var(--border);
            box-shadow: 0 18px 32px rgba(20, 33, 61, 0.06);
        }

        .card h3 {
            margin-top: 0;
            margin-bottom: 8px;
        }

        .stat {
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent-dark);
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border-radius: 999px;
            background: rgba(45, 106, 79, 0.12);
            color: var(--success);
            font-size: 0.9rem;
            font-weight: 600;
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 18px;
        }

        .button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 12px 16px;
            border-radius: 12px;
            border: 0;
            background: var(--accent);
            color: #fff;
            cursor: pointer;
            font-weight: 600;
        }

        .button.secondary {
            background: var(--surface-alt);
            color: var(--text);
        }

        .button:disabled {
            background: #cfd7e6;
            color: #6b7280;
            cursor: not-allowed;
        }

        .button-form {
            margin: 0;
        }

        .button.ghost {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
        }

        .filters {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 14px;
            margin-bottom: 24px;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .field label {
            font-size: 0.92rem;
            font-weight: 600;
            color: var(--muted);
        }

        .field input,
        .field select,
        .field textarea {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 1rem;
            background: #fff;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 2.1fr 1fr;
            gap: 18px;
        }

        .stack {
            display: grid;
            gap: 18px;
        }

        .section-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 14px;
        }

        .section-head h3 {
            margin: 0;
        }

        .muted {
            color: var(--muted);
        }

        .list {
            display: grid;
            gap: 10px;
        }

        .list-item {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
            padding: 14px 16px;
            border-radius: 16px;
            background: #f9fbfd;
            border: 1px solid var(--border);
        }

        .list-item strong,
        .list-item p {
            display: block;
        }

        .list-item p {
            margin: 4px 0 0;
            color: var(--muted);
        }

        .badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 6px 10px;
            border-radius: 999px;
            font-size: 0.84rem;
            font-weight: 700;
            background: #edf2f7;
            color: var(--text);
            white-space: nowrap;
        }

        .badge.warn {
            background: rgba(193, 18, 31, 0.12);
            color: var(--warning);
        }

        .badge.good {
            background: rgba(45, 106, 79, 0.12);
            color: var(--success);
        }

        .mini-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
            gap: 12px;
        }

        .mini-card {
            padding: 16px;
            border-radius: 18px;
            background: #f9fbfd;
            border: 1px solid var(--border);
        }

        .mini-card h4 {
            margin: 0 0 8px;
            font-size: 0.95rem;
            color: var(--muted);
        }

        .mini-card .value {
            font-size: 1.7rem;
            font-weight: 700;
            color: var(--accent-dark);
        }

        .table-wrap {
            overflow-x: auto;
        }

        .tag-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 12px 10px;
            text-align: left;
            border-bottom: 1px solid var(--border);
            vertical-align: top;
        }

        th {
            font-size: 0.84rem;
            letter-spacing: 0.02em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .empty-state {
            padding: 16px;
            border-radius: 16px;
            background: #f9fbfd;
            border: 1px dashed var(--border);
            color: var(--muted);
        }

        .messages {
            display: grid;
            gap: 10px;
            margin-bottom: 16px;
        }

        .message {
            padding: 12px 14px;
            border-radius: 14px;
            border: 1px solid var(--border);
            background: #f9fbfd;
        }

        .message.success {
            border-color: rgba(45, 106, 79, 0.26);
            background: rgba(45, 106, 79, 0.08);
        }

        .message.error {
            border-color: rgba(193, 18, 31, 0.26);
            background: rgba(193, 18, 31, 0.08);
        }

        .login-wrap {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .login-card {
            width: min(460px, 100%);
            padding: 34px;
            border-radius: 28px;
            background: rgba(255, 255, 255, 0.94);
            border: 1px solid rgba(215, 222, 234, 0.95);
            box-shadow: 0 30px 60px rgba(20, 33, 61, 0.12);
        }

        .login-card h1 {
            margin: 0 0 8px;
            font-size: 2rem;
        }

        .login-card form p {
            margin-bottom: 16px;
        }

        .login-card label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
        }

        .login-card input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 1rem;
        }

        .errorlist {
            padding-left: 18px;
            color: var(--warning);
        }

        @media (max-width: 720px) {
            .page {
                padding: 16px;
            }

            .topbar {
                flex-direction: column;
                align-items: flex-start;
            }

            .hero {
                padding: 24px;
            }
        }

        @media (max-width: 980px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    {% if messages %}
    <div class="page" style="min-height: auto; padding-bottom: 0;">
        <div class="shell">
            <div class="messages">
                {% for message in messages %}
                <div class="message {{ message.tags }}">{{ message }}</div>
                {% endfor %}
            </div>
        </div>
    </div>
    {% endif %}
    {% block content %}{% endblock %}
</body>
</html>
