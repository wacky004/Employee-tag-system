<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Employee Tag System{% endblock %}</title>
    <style>
        :root {
            --bg: #f4f7fb;
            --surface: #ffffff;
            --surface-alt: #e9eef5;
            --text: #14213d;
            --muted: #5c677d;
            --accent: #2a6f97;
            --accent-dark: #014f86;
            --success: #2d6a4f;
            --warning: #c1121f;
            --border: #d7deea;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background:
                radial-gradient(circle at top left, rgba(42, 111, 151, 0.18), transparent 30%),
                linear-gradient(180deg, #f8fbff 0%, var(--bg) 100%);
            color: var(--text);
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .page {
            min-height: 100vh;
            padding: 24px;
        }

        .shell {
            max-width: 1180px;
            margin: 0 auto;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 24px;
            padding: 18px 22px;
            background: rgba(255, 255, 255, 0.84);
            border: 1px solid rgba(215, 222, 234, 0.9);
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        .brand h1 {
            margin: 0;
            font-size: 1.35rem;
        }

        .brand p,
        .user-chip,
        .hint,
        .card p,
        .hero p {
            color: var(--muted);
        }

        .brand p,
        .hero p,
        .card p {
            margin: 6px 0 0;
        }

        .user-chip {
            padding: 10px 14px;
            border-radius: 999px;
            background: var(--surface-alt);
            font-size: 0.95rem;
        }

        .hero {
            margin-bottom: 24px;
            padding: 32px;
            border-radius: 28px;
            background: linear-gradient(135deg, rgba(1, 79, 134, 0.96), rgba(42, 111, 151, 0.88));
            color: #fff;
            box-shadow: 0 24px 50px rgba(20, 33, 61, 0.14);
        }

        .hero h2 {
            margin: 0;
            font-size: clamp(2rem, 4vw, 3rem);
        }

        .hero p {
            max-width: 760px;
            color: rgba(255, 255, 255, 0.84);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 18px;
        }

        .card {
            padding: 22px;
            border-radius: 22px;
            background: var(--surface);
            border: 1px solid var(--border);
            box-shadow: 0 18px 32px rgba(20, 33, 61, 0.06);
        }

        .card h3 {
            margin-top: 0;
            margin-bottom: 8px;
        }

        .stat {
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent-dark);
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border-radius: 999px;
            background: rgba(45, 106, 79, 0.12);
            color: var(--success);
            font-size: 0.9rem;
            font-weight: 600;
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 18px;
        }

        .button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 12px 16px;
            border-radius: 12px;
            border: 0;
            background: var(--accent);
            color: #fff;
            cursor: pointer;
            font-weight: 600;
        }

        .button.secondary {
            background: var(--surface-alt);
            color: var(--text);
        }

        .button:disabled {
            background: #cfd7e6;
            color: #6b7280;
            cursor: not-allowed;
        }

        .button.danger {
            background: #c1121f;
            color: #fff;
        }

        .button-form {
            margin: 0;
        }

        .button.ghost {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
        }

        .filters {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 14px;
            margin-bottom: 24px;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .field label {
            font-size: 0.92rem;
            font-weight: 600;
            color: var(--muted);
        }

        .field input,
        .field select,
        .field textarea {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 1rem;
            background: #fff;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 2.1fr 1fr;
            gap: 18px;
        }

        .stack {
            display: grid;
            gap: 18px;
        }

        .section-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 14px;
        }

        .section-head h3 {
            margin: 0;
        }

        .muted {
            color: var(--muted);
        }

        .list {
            display: grid;
            gap: 10px;
        }

        .list-item {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
            padding: 14px 16px;
            border-radius: 16px;
            background: #f9fbfd;
            border: 1px solid var(--border);
        }

        .list-item strong,
        .list-item p {
            display: block;
        }

        .list-item p {
            margin: 4px 0 0;
            color: var(--muted);
        }

        .badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 6px 10px;
            border-radius: 999px;
            font-size: 0.84rem;
            font-weight: 700;
            background: #edf2f7;
            color: var(--text);
            white-space: nowrap;
        }

        .badge.warn {
            background: rgba(193, 18, 31, 0.12);
            color: var(--warning);
        }

        .badge.good {
            background: rgba(45, 106, 79, 0.12);
            color: var(--success);
        }

        .mini-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
            gap: 12px;
        }

        .mini-card {
            padding: 16px;
            border-radius: 18px;
            background: #f9fbfd;
            border: 1px solid var(--border);
        }

        .mini-card h4 {
            margin: 0 0 8px;
            font-size: 0.95rem;
            color: var(--muted);
        }

        .mini-card .value {
            font-size: 1.7rem;
            font-weight: 700;
            color: var(--accent-dark);
        }

        .table-wrap {
            overflow-x: auto;
        }

        .tag-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
        }

        .status-banner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 18px 20px;
            border-radius: 18px;
            border: 1px solid rgba(193, 18, 31, 0.18);
            background: rgba(193, 18, 31, 0.08);
            color: #7f1d1d;
        }

        .status-banner strong {
            font-size: 1.1rem;
        }

        .timer {
            font-size: 1.8rem;
            font-weight: 700;
            color: #9f1239;
            white-space: nowrap;
        }

        .clock-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 22px;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.18);
            backdrop-filter: blur(8px);
            min-width: 250px;
        }

        .clock-panel .live-time {
            font-size: clamp(2.2rem, 5vw, 3.6rem);
            font-weight: 700;
            letter-spacing: 0.06em;
        }

        .clock-panel .live-date {
            margin-top: 8px;
            color: rgba(255, 255, 255, 0.82);
        }

        .hero-layout {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 24px;
        }

        .tabs {
            display: inline-flex;
            gap: 10px;
            padding: 6px;
            border-radius: 999px;
            background: rgba(233, 238, 245, 0.9);
            margin-bottom: 18px;
        }

        .tab-link {
            padding: 10px 16px;
            border-radius: 999px;
            font-weight: 600;
            color: var(--muted);
        }

        .tab-link.active {
            background: #fff;
            color: var(--accent-dark);
            box-shadow: 0 8px 18px rgba(20, 33, 61, 0.08);
        }

        .control-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 14px;
        }

        .control-card {
            padding: 18px;
            border-radius: 18px;
            border: 1px solid var(--border);
            background: #f9fbfd;
        }

        .control-card.active {
            background: rgba(193, 18, 31, 0.08);
            border-color: rgba(193, 18, 31, 0.24);
        }

        .control-card h4 {
            margin: 0 0 8px;
            font-size: 1rem;
        }

        .remaining {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--accent-dark);
        }

        .countdown {
            font-size: 1rem;
            font-weight: 700;
            color: #9f1239;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 12px 10px;
            text-align: left;
            border-bottom: 1px solid var(--border);
            vertical-align: top;
        }

        th {
            font-size: 0.84rem;
            letter-spacing: 0.02em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .empty-state {
            padding: 16px;
            border-radius: 16px;
            background: #f9fbfd;
            border: 1px dashed var(--border);
            color: var(--muted);
        }

        .inventory-shell {
            max-width: 1380px;
        }

        .inventory-layout {
            display: grid;
            grid-template-columns: 280px minmax(0, 1fr);
            gap: 24px;
            align-items: start;
        }

        .inventory-sidebar,
        .inventory-main,
        .inventory-section,
        .inventory-kpi,
        .inventory-status-pill {
            background: rgba(255, 255, 255, 0.92);
            border: 1px solid rgba(215, 222, 234, 0.95);
            box-shadow: 0 18px 36px rgba(20, 33, 61, 0.06);
        }

        .inventory-sidebar {
            position: sticky;
            top: 24px;
            display: grid;
            gap: 24px;
            padding: 24px 18px;
            border-radius: 24px;
            backdrop-filter: blur(10px);
        }

        .inventory-sidebar__head h2,
        .inventory-header h1,
        .inventory-section__head h2 {
            margin: 0;
        }

        .inventory-sidebar__eyebrow,
        .inventory-header__eyebrow {
            margin: 0 0 8px;
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--accent);
        }

        .inventory-sidebar__head p,
        .inventory-header__summary,
        .inventory-section__head p {
            margin: 8px 0 0;
            color: var(--muted);
        }

        .inventory-nav {
            display: grid;
            gap: 8px;
        }

        .inventory-nav__item {
            display: block;
            padding: 14px 16px;
            border-radius: 16px;
            border: 1px solid transparent;
            transition: background 0.18s ease, border-color 0.18s ease, transform 0.18s ease;
        }

        .inventory-nav__button {
            width: 100%;
            text-align: left;
            font: inherit;
            color: inherit;
            background: transparent;
            cursor: pointer;
        }

        .inventory-nav__item:hover {
            background: #f7fafc;
            border-color: var(--border);
            transform: translateX(2px);
        }

        .inventory-nav__item.active {
            background: linear-gradient(135deg, rgba(42, 111, 151, 0.12), rgba(1, 79, 134, 0.08));
            border-color: rgba(42, 111, 151, 0.18);
        }

        .inventory-nav__title,
        .inventory-nav__meta {
            display: block;
        }

        .inventory-nav__title {
            font-weight: 700;
            color: var(--text);
        }

        .inventory-nav__meta {
            margin-top: 4px;
            font-size: 0.9rem;
            color: var(--muted);
        }

        .inventory-sidebar__back {
            width: 100%;
        }

        .inventory-main {
            padding: 26px;
            border-radius: 28px;
            backdrop-filter: blur(10px);
        }

        .inventory-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 18px;
            margin-bottom: 24px;
        }

        .inventory-header__actions {
            display: flex;
            flex-wrap: wrap;
            justify-content: flex-end;
            gap: 12px;
        }

        .inventory-section {
            padding: 22px;
            border-radius: 22px;
        }

        .inventory-section + .inventory-section {
            margin-top: 20px;
        }

        .inventory-section__head {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 18px;
        }

        .inventory-kpi-grid {
            display: grid;
            grid-template-columns: repeat(5, minmax(0, 1fr));
            gap: 14px;
        }

        .inventory-kpi {
            padding: 18px;
            border-radius: 18px;
        }

        .inventory-kpi__label,
        .inventory-kpi__hint,
        .inventory-status-pill__label {
            display: block;
        }

        .inventory-kpi__label {
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--muted);
        }

        .inventory-kpi__value {
            display: block;
            margin-top: 10px;
            font-size: 2rem;
            line-height: 1;
            color: var(--accent-dark);
        }

        .inventory-kpi__hint {
            margin-top: 10px;
            font-size: 0.9rem;
            color: var(--muted);
        }

        .inventory-status-row {
            display: grid;
            grid-template-columns: repeat(5, minmax(0, 1fr));
            gap: 12px;
        }

        .inventory-status-pill {
            padding: 16px 18px;
            border-radius: 18px;
        }

        .inventory-status-pill__label {
            font-size: 0.9rem;
            color: var(--muted);
        }

        .inventory-status-pill__value {
            display: block;
            margin-top: 8px;
            font-size: 1.7rem;
            color: var(--text);
        }

        .inventory-status-pill--defective {
            background: rgba(193, 18, 31, 0.08);
            border-color: rgba(193, 18, 31, 0.18);
        }

        .inventory-status-pill--brandnew {
            background: rgba(45, 106, 79, 0.08);
            border-color: rgba(45, 106, 79, 0.18);
        }

        .inventory-status-pill--unused,
        .inventory-status-pill--used,
        .inventory-status-pill--to_be_checked {
            background: #f9fbfd;
        }

        .inventory-main-grid {
            display: grid;
            grid-template-columns: minmax(0, 1.6fr) minmax(280px, 0.9fr);
            gap: 20px;
            margin-top: 20px;
        }

        .inventory-section--fill,
        .inventory-section--side {
            height: 100%;
        }

        .inventory-table-wrap table td:last-child,
        .inventory-table-wrap table th:last-child {
            white-space: nowrap;
        }

        .inventory-quick-actions {
            display: grid;
            gap: 12px;
        }

        .inventory-quick-actions .button {
            width: 100%;
        }

        .inventory-modal {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 24px;
            z-index: 1000;
        }

        .inventory-modal.is-open {
            display: flex;
        }

        .inventory-modal__backdrop {
            position: absolute;
            inset: 0;
            background: rgba(20, 33, 61, 0.42);
            backdrop-filter: blur(6px);
        }

        .inventory-modal__panel {
            position: relative;
            z-index: 1;
            width: min(1120px, 100%);
            max-height: calc(100vh - 48px);
            overflow-y: auto;
            padding: 24px;
            border-radius: 28px;
            background: rgba(255, 255, 255, 0.96);
            border: 1px solid rgba(215, 222, 234, 0.95);
            box-shadow: 0 28px 80px rgba(20, 33, 61, 0.22);
        }

        .inventory-modal__header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 18px;
            margin-bottom: 20px;
        }

        .inventory-modal__header h2 {
            margin: 0;
        }

        .inventory-modal__summary {
            margin: 8px 0 0;
            color: var(--muted);
        }

        .inventory-modal__body {
            padding-top: 4px;
        }

        .inventory-floating-modal {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 24px;
            z-index: 1100;
        }

        .inventory-floating-modal.is-open {
            display: flex;
        }

        .inventory-floating-modal__backdrop {
            position: absolute;
            inset: 0;
            background: rgba(20, 33, 61, 0.46);
            backdrop-filter: blur(6px);
        }

        .inventory-floating-modal__panel {
            position: relative;
            z-index: 1;
            width: min(1320px, 100%);
            height: min(88vh, 920px);
            display: flex;
            flex-direction: column;
            padding: 24px;
            border-radius: 28px;
            background: rgba(255, 255, 255, 0.98);
            border: 1px solid rgba(215, 222, 234, 0.95);
            box-shadow: 0 28px 80px rgba(20, 33, 61, 0.22);
        }

        .inventory-floating-modal__header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 18px;
            margin-bottom: 18px;
        }

        .inventory-floating-modal__header h2 {
            margin: 0;
        }

        .inventory-floating-modal__body {
            flex: 1;
            min-height: 0;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--border);
            background: #f7fafc;
        }

        .inventory-floating-modal__frame {
            width: 100%;
            height: 100%;
            border: 0;
            background: #fff;
        }

        .messages {
            display: grid;
            gap: 10px;
            margin-bottom: 16px;
        }

        .message {
            padding: 12px 14px;
            border-radius: 14px;
            border: 1px solid var(--border);
            background: #f9fbfd;
        }

        .message.success {
            border-color: rgba(45, 106, 79, 0.26);
            background: rgba(45, 106, 79, 0.08);
        }

        .message.error {
            border-color: rgba(193, 18, 31, 0.26);
            background: rgba(193, 18, 31, 0.08);
        }

        .message.info {
            border-color: rgba(42, 111, 151, 0.26);
            background: rgba(42, 111, 151, 0.08);
        }

        .message.warning {
            border-color: rgba(237, 137, 54, 0.26);
            background: rgba(237, 137, 54, 0.1);
        }

        .login-wrap {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .login-card {
            width: min(460px, 100%);
            padding: 34px;
            border-radius: 28px;
            background: rgba(255, 255, 255, 0.94);
            border: 1px solid rgba(215, 222, 234, 0.95);
            box-shadow: 0 30px 60px rgba(20, 33, 61, 0.12);
        }

        .login-card h1 {
            margin: 0 0 8px;
            font-size: 2rem;
        }

        .login-card form p {
            margin-bottom: 16px;
        }

        .login-card label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
        }

        .login-card input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 1rem;
        }

        .errorlist {
            padding-left: 18px;
            color: var(--warning);
        }

        @media (max-width: 720px) {
            .page {
                padding: 16px;
            }

            .topbar {
                flex-direction: column;
                align-items: flex-start;
            }

            .hero {
                padding: 24px;
            }

            .hero-layout {
                flex-direction: column;
                align-items: flex-start;
            }

            .inventory-header {
                flex-direction: column;
            }

            .inventory-header__actions {
                justify-content: flex-start;
            }

            .inventory-modal {
                padding: 16px;
            }

            .inventory-modal__header {
                flex-direction: column;
            }

            .inventory-floating-modal {
                padding: 16px;
            }

            .inventory-floating-modal__panel {
                height: min(92vh, 920px);
                padding: 18px;
            }

            .inventory-floating-modal__header {
                flex-direction: column;
            }
        }

        @media (max-width: 980px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }

            .inventory-layout {
                grid-template-columns: 1fr;
            }

            .inventory-sidebar {
                position: static;
            }

            .inventory-kpi-grid,
            .inventory-status-row,
            .inventory-main-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    {% if messages %}
    <div class="page" style="min-height: auto; padding-bottom: 0;">
        <div class="shell">
            <div class="messages">
                {% for message in messages %}
                <div class="message {{ message.tags }}">{{ message }}</div>
                {% endfor %}
            </div>
        </div>
    </div>
    {% endif %}
    {% block content %}{% endblock %}
</body>
</html>
